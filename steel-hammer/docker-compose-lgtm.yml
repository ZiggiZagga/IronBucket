version: '3.8'

services:

  # =============================================
  # OBSERVABILITY STACK - LGTM
  # =============================================

  loki:
    image: grafana/loki:latest
    container_name: steel-hammer-loki
    hostname: steel-hammer-loki
    user: "10001:10001"
    networks:
      - steel-hammer-network
    volumes:
      - loki-storage:/loki
      - ./loki-config.yaml:/etc/loki/loki-config.yaml
    command: -config.file=/etc/loki/loki-config.yaml
    restart: always

  mimir:
    image: grafana/mimir:latest
    container_name: steel-hammer-mimir
    hostname: steel-hammer-mimir
    networks:
      - steel-hammer-network
    volumes:
      - mimir-storage:/data
      - ./mimir-config.yaml:/etc/mimir/mimir.yaml
    command: -config.file=/etc/mimir/mimir.yaml
    restart: always

  tempo:
    image: grafana/tempo:2.9.0
    container_name: steel-hammer-tempo
    hostname: steel-hammer-tempo
    networks:
      - steel-hammer-network
    volumes:
      - tempo-storage:/var/tempo
      - ./tempo-config.yaml:/etc/tempo/tempo-config.yaml
    command: -config.file=/etc/tempo/tempo-config.yaml
    restart: always
  promtail:
    image: grafana/promtail:latest
    container_name: steel-hammer-promtail
    hostname: steel-hammer-promtail
    networks:
      - steel-hammer-network
    depends_on:
      - loki
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: steel-hammer-grafana
    hostname: steel-hammer-grafana
    networks:
      - steel-hammer-network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-storage:/var/lib/grafana
    restart: always

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: steel-hammer-otel-collector
    hostname: steel-hammer-otel-collector
    networks:
      - steel-hammer-network
    command:
      - "--config=/etc/otel-collector-config.yml"
    environment:
      - GOGC=80
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
    restart: always

  # =============================================
  # SECRETS / VAULT (TLS)
  # =============================================

  steel-hammer-vault:
    networks:
      - steel-hammer-network
    image: hashicorp/vault:1.17
    container_name: steel-hammer-vault
    hostname: steel-hammer-vault
    cap_add:
      - IPC_LOCK
    command: /bin/sh /vault/local/start-with-shared-ca.sh
    ports:
      - "8200:8200"
    volumes:
      - vault-storage:/vault/file
      - ../certs:/certs:ro
      - ./vault:/vault/local:ro
    environment:
      - "VAULT_ADDR=https://127.0.0.1:8200"
      - "VAULT_CACERT=/certs/ca/ca.crt"
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1:8200/v1/sys/health?standbyok=true"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: always

  # =============================================
  # DATA LAYER
  # =============================================

  steel-hammer-postgres:
    networks:
      - steel-hammer-network
    hostname: steel-hammer-postgres
    container_name: steel-hammer-postgres
    build:
      context: .
      dockerfile: postgres/DockerfilePostgres
    environment:
      - "POSTGRES_PASSWORD=postgres_admin_pw"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  steel-hammer-minio:
    networks:
      - steel-hammer-network
    hostname: steel-hammer-minio
    container_name: steel-hammer-minio
    build:
      context: .
      dockerfile: minio/DockerfileMinio
    command: /bin/sh -c "mkdir -p /opt/minio/.minio/certs && cp /certs/services/infrastructure/minio/tls.crt /opt/minio/.minio/certs/public.crt && cp /certs/services/infrastructure/minio/tls.key /opt/minio/.minio/certs/private.key && exec /opt/minio/minio server /opt/minio/data --console-address=':9001'"
    environment:
      - "MINIO_ROOT_USER=${MINIO_ROOT_USER:-vault-managed-root-user}"
      - "MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-vault-managed-root-password}"
      - "MINIO_PROMETHEUS_AUTH_TYPE=public"
    volumes:
      - minio-storage:/minio-storage
      - ../certs:/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # =============================================
  # IDENTITY
  # =============================================

  steel-hammer-keycloak:
    networks:
      - steel-hammer-network
    restart: always
    hostname: steel-hammer-keycloak
    container_name: steel-hammer-keycloak
    build:
      context: .
      dockerfile: keycloak/DockerfileKeycloak
    entrypoint: [ "/opt/keycloak/keycloak/bin/kc.sh", "start", "--import-realm", "--http-enabled=false", "--https-port=7081", "--https-certificate-file=/certs/services/infrastructure/keycloak/tls.crt", "--https-certificate-key-file=/certs/services/infrastructure/keycloak/tls.key", "--hostname=https://steel-hammer-keycloak:7081", "--hostname-strict=false" ]
    volumes:
      - ./keycloak/dev-realm.json:/opt/keycloak/keycloak/data/import/dev-realm.json
      - ../certs:/certs:ro
    environment:
      - "KC_BOOTSTRAP_ADMIN_USERNAME=admin"
      - "KC_BOOTSTRAP_ADMIN_PASSWORD=admin"
      - "KC_METRICS_ENABLED=true"
      - "KC_HEALTH_ENABLED=true"
      - "KC_LEGACY_OBSERVABILITY_INTERFACE=true"
      - "KC_DB=postgres"
      - "KC_DB_USERNAME=keycloak_db_user"
      - "KC_DB_PASSWORD=keycloak_db_pass"
      - "KC_DB_URL=jdbc:postgresql://steel-hammer-postgres:5432/keycloak"
    depends_on:
      - steel-hammer-postgres

  steel-hammer-postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    container_name: steel-hammer-postgres-exporter
    hostname: steel-hammer-postgres-exporter
    networks:
      - steel-hammer-network
    environment:
      - "DATA_SOURCE_NAME=postgresql://postgres:postgres_admin_pw@steel-hammer-postgres:5432/postgres?sslmode=disable"
    depends_on:
      - steel-hammer-postgres
    restart: always

  # =============================================
  # SERVICE MESH
  # =============================================

  steel-hammer-buzzle-vane:
    networks:
      - steel-hammer-network
    hostname: steel-hammer-buzzle-vane
    container_name: steel-hammer-buzzle-vane
    build:
      context: ../services/Buzzle-Vane
      dockerfile: Dockerfile
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["cp /certs/ca/ca.crt /usr/local/share/ca-certificates/ironbucket-ca.crt && update-ca-certificates && exec java -jar app.jar --spring.profiles.active=docker"]
    volumes:
      - ../certs:/certs:ro
    depends_on:
      - steel-hammer-keycloak
      - otel-collector
    environment:
      - "SPRING_PROFILES_ACTIVE=docker"
      - "JAVA_TOOL_OPTIONS=-Djavax.net.ssl.trustStore=/certs/ca/ca-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
      - "SPRING_APPLICATION_NAME=buzzle-vane"
      - "SPRING_CLOUD_VAULT_ENABLED=false"
      - "MANAGEMENT_HEALTH_VAULT_ENABLED=false"
      - "EUREKA_SERVER_ENABLE_SELF_PRESERVATION=false"
      - "MANAGEMENT_OTLP_TRACING_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_METRICS_TAGS_ENVIRONMENT=docker"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "OTEL_EXPORTER_OTLP_PROTOCOL=grpc"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # =============================================
  # GATEWAY & MICROSERVICES
  # =============================================

  steel-hammer-sentinel-gear:
    networks:
      - steel-hammer-network
    hostname: steel-hammer-sentinel-gear
    container_name: steel-hammer-sentinel-gear
    build:
      context: ../services/Sentinel-Gear
      dockerfile: Dockerfile
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["cp /certs/ca/ca.crt /usr/local/share/ca-certificates/ironbucket-ca.crt && update-ca-certificates && exec java -jar app.jar --spring.profiles.active=docker"]
    volumes:
      - ../certs:/certs:ro
    depends_on:
      - steel-hammer-keycloak
      - steel-hammer-postgres
      - steel-hammer-graphite-forge
      - otel-collector
    environment:
      - "SPRING_PROFILES_ACTIVE=docker"
      - "JAVA_TOOL_OPTIONS=-Djavax.net.ssl.trustStore=/certs/ca/ca-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
      - "POSTGRES_PASSWORD=postgres_admin_pw"
      - "SPRING_APPLICATION_NAME=sentinel-gear"
      - "SPRING_CLOUD_VAULT_ENABLED=false"
      - "MANAGEMENT_HEALTH_VAULT_ENABLED=false"
      - "IRONBUCKET_SECURITY_PRESIGNED_SECRET=${IRONBUCKET_SECURITY_PRESIGNED_SECRET:-dev-presigned-secret-for-steel-hammer}"
      - "EUREKA_URI=http://steel-hammer-buzzle-vane:8083/eureka"
      - "EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE=http://steel-hammer-buzzle-vane:8083/eureka"
      - "MANAGEMENT_OTLP_TRACING_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_METRICS_TAGS_ENVIRONMENT=docker"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "OTEL_EXPORTER_OTLP_PROTOCOL=grpc"
      - "LOGGING_LEVEL_COM_IRONBUCKET=DEBUG"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health-check"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  steel-hammer-graphite-forge:
    networks:
      - steel-hammer-network
    hostname: steel-hammer-graphite-forge
    container_name: steel-hammer-graphite-forge
    build:
      context: ../services/Graphite-Forge
      dockerfile: Dockerfile
    user: "0:0"
    entrypoint: ["/bin/bash", "-lc"]
    command: ["cp /certs/ca/ca.crt /usr/local/share/ca-certificates/ironbucket-ca.crt && update-ca-certificates && exec java -jar /app/graphite-forge.jar"]
    volumes:
      - ../certs:/certs:ro
    environment:
      - "JAVA_TOOL_OPTIONS=-Djavax.net.ssl.trustStore=/certs/ca/ca-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
      - "SPRING_APPLICATION_NAME=graphite-forge"
      - "SPRING_PROFILES_ACTIVE=docker"
      - "EUREKA_URI=http://steel-hammer-buzzle-vane:8083/eureka"
      - "MANAGEMENT_OTLP_TRACING_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_TRACING_SAMPLING_PROBABILITY=1.0"
      - "MANAGEMENT_METRICS_TAGS_ENVIRONMENT=docker"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=http://steel-hammer-otel-collector:4317"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: always

  steel-hammer-claimspindel:
    networks:
      - steel-hammer-network
    hostname: steel-hammer-claimspindel
    container_name: steel-hammer-claimspindel
    build:
      context: ../services/Claimspindel
      dockerfile: Dockerfile
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["cp /certs/ca/ca.crt /usr/local/share/ca-certificates/ironbucket-ca.crt && update-ca-certificates && exec java -jar app.jar --spring.profiles.active=docker"]
    volumes:
      - ../certs:/certs:ro
    depends_on:
      - steel-hammer-keycloak
      - steel-hammer-postgres
      - steel-hammer-sentinel-gear
      - otel-collector
    environment:
      - "SPRING_PROFILES_ACTIVE=docker"
      - "JAVA_TOOL_OPTIONS=-Djavax.net.ssl.trustStore=/certs/ca/ca-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
      - "POSTGRES_PASSWORD=postgres_admin_pw"
      - "SPRING_APPLICATION_NAME=claimspindel"
      - "SPRING_CLOUD_VAULT_ENABLED=false"
      - "MANAGEMENT_HEALTH_VAULT_ENABLED=false"
      - "EUREKA_URI=http://steel-hammer-buzzle-vane:8083/eureka"
      - "EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE=http://steel-hammer-buzzle-vane:8083/eureka"
      - "MANAGEMENT_OTLP_TRACING_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_METRICS_TAGS_ENVIRONMENT=docker"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "OTEL_EXPORTER_OTLP_PROTOCOL=grpc"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  steel-hammer-brazz-nossel:
    networks:
      - steel-hammer-network
    hostname: steel-hammer-brazz-nossel
    container_name: steel-hammer-brazz-nossel
    build:
      context: ../services/Brazz-Nossel
      dockerfile: Dockerfile
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command: ["cp /certs/ca/ca.crt /usr/local/share/ca-certificates/ironbucket-ca.crt && update-ca-certificates && exec java -jar app.jar --spring.profiles.active=docker"]
    volumes:
      - ../certs:/certs:ro
    depends_on:
      - steel-hammer-keycloak
      - steel-hammer-postgres
      - steel-hammer-claimspindel
      - steel-hammer-minio
      - otel-collector
    environment:
      - "SPRING_PROFILES_ACTIVE=docker"
      - "JAVA_TOOL_OPTIONS=-Djavax.net.ssl.trustStore=/certs/ca/ca-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
      - "POSTGRES_PASSWORD=postgres_admin_pw"
      - "MINIO_ACCESS_KEY=vault-managed-root-user"
      - "MINIO_SECRET_KEY=vault-managed-root-password"
      - "SPRING_APPLICATION_NAME=brazz-nossel"
      - "SPRING_CLOUD_VAULT_ENABLED=false"
      - "MANAGEMENT_HEALTH_VAULT_ENABLED=false"
      - "EUREKA_URI=http://steel-hammer-buzzle-vane:8083/eureka"
      - "EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE=http://steel-hammer-buzzle-vane:8083/eureka"
      - "MANAGEMENT_OTLP_TRACING_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_METRICS_TAGS_ENVIRONMENT=docker"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "OTEL_EXPORTER_OTLP_PROTOCOL=grpc"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # =============================================
  # TEST CLIENT (Internal E2E Tests)
  # =============================================

  steel-hammer-test-client:
    networks:
      - steel-hammer-network
    hostname: steel-hammer-test-client
    container_name: steel-hammer-test-client
    image: curlimages/curl:latest
    depends_on:
      - steel-hammer-sentinel-gear
      - steel-hammer-claimspindel
      - steel-hammer-brazz-nossel
      - steel-hammer-buzzle-vane
    environment:
      - KEYCLOAK_URL=https://steel-hammer-keycloak:7081
      - MINIO_URL=https://steel-hammer-minio:9000
      - POSTGRES_HOST=steel-hammer-postgres
      - SENTINEL_GEAR_URL=http://steel-hammer-sentinel-gear:8080
      - CLAIMSPINDEL_URL=http://steel-hammer-claimspindel:8081
      - BRAZZ_NOSSEL_URL=http://steel-hammer-brazz-nossel:8082
      - BUZZLE_VANE_URL=http://steel-hammer-buzzle-vane:8083
      - CURL_CA_BUNDLE=/certs/ca/ca.crt
    volumes:
      - ./test-scripts:/scripts:ro
      - ../certs:/certs:ro
      - /tmp/ironbucket-e2e-reports:/tmp/ironbucket-e2e-reports
    entrypoint: ["/bin/sh", "-c", "sleep 15 && sh /scripts/e2e-via-gateway.sh && sleep 3600"]
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  steel-hammer-network:
    driver: bridge

volumes:
  vault-storage:
  postgres-storage:
  minio-storage:
  loki-storage:
  mimir-storage:
  tempo-storage:
  grafana-storage:
