multitenancy_enabled: false

limits:
  ingestion_rate: 10000
  ingestion_burst_size: 20000

ingester:
  ring:
    replication_factor: 1

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data
  tsdb:
    dir: /data/tsdb
  bucket_store:
    sync_interval: 15m

server:
  http_listen_port: 9009
  log_level: info
