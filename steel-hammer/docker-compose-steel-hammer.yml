services:

  steel-hammer-postgres:

    networks:
      - steel-hammer-network

    hostname: steel-hammer-postgres
    container_name: steel-hammer-postgres

    build:
      context: . 
      dockerfile: ./postgres/DockerfilePostgres
    
    environment:
      - "POSTGRES_PASSWORD=postgres_admin_pw"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    restart: always

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 12


  steel-hammer-keycloak:
    networks:
      - steel-hammer-network

    restart: always
    
    hostname: steel-hammer-keycloak
    container_name: steel-hammer-keycloak

    build:
      context: . 
      dockerfile: ./keycloak/DockerfileKeycloak
    
    #TODO security first
    #entrypoint: [ "/opt/keycloak/keycloak/bin/kc.sh", "start","--hostname", "steel-hammer-keycloak",  "--https-port=7082" ]
    entrypoint: [ "/opt/keycloak/keycloak/bin/kc.sh", "start-dev", "--import-realm",  "--http-port=7081" ]
    
    volumes:      
       - ./keycloak/dev-realm.json:/opt/keycloak/keycloak/data/import/dev-realm.json
      
    environment:
      #- "KC_HTTPS_KEY_STORE_FILE=/opt/keycloak/certs/keycloak.jks"
      #- "KC_HTTPS_KEY_STORE_PASSWORD=KC_HTTPS_KEY_STORE_PASSWORD"
      - "KC_BOOTSTRAP_ADMIN_USERNAME=admin"
      - "KC_BOOTSTRAP_ADMIN_PASSWORD=admin"
      - "KC_DB=postgres"
      - "KC_DB_USERNAME=keycloak_db_user"
      - "KC_DB_PASSWORD=keycloak_db_pass"
      - "KC_DB_URL=jdbc:postgresql://steel-hammer-postgres:5432/keycloak"

    depends_on:
      - steel-hammer-postgres

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7081/realms/dev/.well-known/openid-configuration"]
      interval: 10s
      timeout: 5s
      retries: 12

  steel-hammer-buzzle-vane:
    networks:
      - steel-hammer-network

    hostname: steel-hammer-buzzle-vane
    container_name: steel-hammer-buzzle-vane

    build:
      context: ../services/Buzzle-Vane
      dockerfile: Dockerfile

    depends_on:
      - steel-hammer-keycloak
      - steel-hammer-postgres

    volumes:
      - ../certs:/certs:ro

    environment:
      - "SPRING_PROFILES_ACTIVE=docker${MTLS_PROFILE:-}"
      - "CERT_BASE_PATH=file:/certs"
      - "SPRING_APPLICATION_NAME=buzzle-vane"
      - "EUREKA_SERVER_ENABLE_SELF_PRESERVATION=false"
      - "MANAGEMENT_OTLP_TRACING_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_METRICS_TAGS_ENVIRONMENT=docker"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "HEALTH_CHECK_URL=http://steel-hammer-buzzle-vane:8083/actuator/health"

    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "curl -kf $${HEALTH_CHECK_URL}"]
      interval: 10s
      timeout: 5s
      retries: 3

    restart: "always"

  steel-hammer-sentinel-gear:
    networks:
      - steel-hammer-network

    hostname: steel-hammer-sentinel-gear
    container_name: steel-hammer-sentinel-gear

    build:
      context: ../services/Sentinel-Gear
      dockerfile: Dockerfile

    ports:
      - "8080:8080"
      - "8081:8081"

    depends_on:
      - steel-hammer-keycloak
      - steel-hammer-postgres
      - steel-hammer-buzzle-vane

    volumes:
      # Mount certificates for mTLS (if --with-mtls flag is used)
      - ../certs:/certs:ro

    environment:
      - "SPRING_PROFILES_ACTIVE=docker${MTLS_PROFILE:-}"
      - "CERT_BASE_PATH=file:/certs"
      - "POSTGRES_PASSWORD=postgres_admin_pw"
      - "SPRING_APPLICATION_NAME=sentinel-gear"
      - "EUREKA_URI=http://steel-hammer-buzzle-vane:8083/eureka"
      - "MANAGEMENT_OTLP_TRACING_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_METRICS_TAGS_ENVIRONMENT=docker"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_SERVER_ADDRESS=0.0.0.0"
      - "MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always"
      - "HEALTH_CHECK_URL=http://steel-hammer-sentinel-gear:8081/actuator/health-check"

    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "curl -kf $${HEALTH_CHECK_URL}"]
      interval: 10s
      timeout: 5s
      retries: 3

    restart: "always"

  steel-hammer-claimspindel:
    networks:
      - steel-hammer-network

    hostname: steel-hammer-claimspindel
    container_name: steel-hammer-claimspindel

    build:
      context: ../services/Claimspindel
      dockerfile: Dockerfile

    depends_on:
      - steel-hammer-keycloak
      - steel-hammer-postgres
      - steel-hammer-buzzle-vane
      - steel-hammer-sentinel-gear

    volumes:
      - ../certs:/certs:ro

    environment:
      - "CERT_BASE_PATH=file:/certs"
      - "POSTGRES_PASSWORD=postgres_admin_pw"
      - "SPRING_APPLICATION_NAME=claimspindel"
      - "EUREKA_URI=http://steel-hammer-buzzle-vane:8083/eureka"
      - "MANAGEMENT_OTLP_TRACING_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_METRICS_TAGS_ENVIRONMENT=docker"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,metrics,prometheus"
      - "MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always"
      - "HEALTH_CHECK_URL=http://steel-hammer-claimspindel:8081/actuator/health"

    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "curl -kf $${HEALTH_CHECK_URL}"]
      interval: 10s
      timeout: 5s
      retries: 3

    restart: "always"

  steel-hammer-brazz-nossel:
    networks:
      - steel-hammer-network

    hostname: steel-hammer-brazz-nossel
    container_name: steel-hammer-brazz-nossel

    build:
      context: ../services/Brazz-Nossel
      dockerfile: Dockerfile

    depends_on:
      - steel-hammer-keycloak
      - steel-hammer-buzzle-vane
      - steel-hammer-postgres
      - steel-hammer-claimspindel
      - steel-hammer-minio

    volumes:
      - ../certs:/certs:ro

    environment:
      - "SPRING_PROFILES_ACTIVE=docker${MTLS_PROFILE:-}"
      - "CERT_BASE_PATH=file:/certs"
      - "POSTGRES_PASSWORD=postgres_admin_pw"
      - "MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vault-managed-root-user}"
      - "MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vault-managed-root-password}"
      - "SPRING_APPLICATION_NAME=brazz-nossel"
      - "EUREKA_URI=http://steel-hammer-buzzle-vane:8083/eureka"
      - "MANAGEMENT_OTLP_TRACING_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_METRICS_TAGS_ENVIRONMENT=docker"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=http://steel-hammer-otel-collector:4317"
      - "HEALTH_CHECK_URL=http://steel-hammer-brazz-nossel:8082/actuator/health"

    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "curl -kf $${HEALTH_CHECK_URL}"]
      interval: 10s
      timeout: 5s
      retries: 3

    restart: "always"

  steel-hammer-minio:
    networks:
      - steel-hammer-network

    hostname: steel-hammer-minio
    container_name: steel-hammer-minio

    restart: always

    build:
      context: ./minio
      dockerfile: DockerfileMinio

    command: /opt/minio/minio server /opt/minio/data --console-address=":9001"

    environment:
      - "MINIO_BROWSER=on"
      - "MINIO_ROOT_USER=${MINIO_ROOT_USER:-vault-managed-root-user}"
      - "MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-vault-managed-root-password}"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://steel-hammer-minio:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  steel-hammer-test:
    networks:
      - steel-hammer-network

    hostname: steel-hammer-test
    container_name: steel-hammer-test

    build:
      context: .
      dockerfile: ./DockerfileTestRunner

    volumes:
      - ./tests:/tests
      - /tmp/ironbucket-test:/tmp/ironbucket-test
      - ./test-scripts:/scripts:ro
      - ../scripts:/workspaces/IronBucket/scripts:ro
      - ../services:/workspaces/IronBucket/services:ro
      - ../tools:/workspaces/IronBucket/tools:ro
      - ../docs:/workspaces/IronBucket/docs:ro
      - ../README.md:/workspaces/IronBucket/README.md:ro
      - /workspaces/IronBucket/temp:/workspaces/IronBucket/temp
      - /workspaces/IronBucket/.git:/ironbucket/.git:ro

    depends_on:
      steel-hammer-keycloak:
        condition: service_healthy
      steel-hammer-postgres:
        condition: service_healthy
      steel-hammer-sentinel-gear:
        condition: service_healthy
      steel-hammer-claimspindel:
        condition: service_healthy
      steel-hammer-brazz-nossel:
        condition: service_healthy
      steel-hammer-buzzle-vane:
        condition: service_healthy

    environment:
      - "KEYCLOAK_URL=http://steel-hammer-keycloak:7081"
      - "MINIO_URL=http://steel-hammer-minio:9000"
      - "POSTGRES_HOST=steel-hammer-postgres"
      - "SENTINEL_GEAR_URL=http://steel-hammer-sentinel-gear:8080"
      - "CLAIMSPINDEL_URL=http://steel-hammer-claimspindel:8081"
      - "BRAZZ_NOSSEL_URL=http://steel-hammer-brazz-nossel:8082"
      - "BUZZLE_VANE_URL=http://steel-hammer-buzzle-vane:8083"

    # Test will run automatically when container starts
    # Runs complete E2E verification: Maven tests + services + S3 + JWT
    entrypoint: ["/bin/sh", "-c", "/scripts/run-e2e-complete.sh"]

    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  steel-hammer-network:
    driver: bridge
