      - vault-pki-certs:/vault-pki-certs:ro

    environment:
      - "SPRING_PROFILES_ACTIVE=docker${MTLS_PROFILE:-}"
      - "CERT_BASE_PATH=file:/vault-pki-certs"
      - "JAVA_TOOL_OPTIONS=-Djavax.net.ssl.trustStore=/vault-pki-certs/ca/ca-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
      - "POSTGRES_PASSWORD=postgres_admin_pw"
      - "SPRING_APPLICATION_NAME=sentinel-gear"
      - "SPRING_CLOUD_VAULT_ENABLED=${SPRING_CLOUD_VAULT_ENABLED:-true}"
      - "SPRING_CLOUD_VAULT_URI=https://steel-hammer-vault:8200"
      - "SPRING_CLOUD_VAULT_SSL_SKIP_VERIFY=false"
      - "SPRING_CLOUD_VAULT_SSL_VERIFY_HOSTNAME=true"
      - "SPRING_CLOUD_VAULT_SSL_TRUST_STORE=file:/vault-pki-certs/ca/ca-truststore.p12"
      - "SPRING_CLOUD_VAULT_SSL_TRUST_STORE_PASSWORD=changeit"
      - "SPRING_CLOUD_VAULT_SSL_TRUST_STORE_TYPE=PKCS12"
      - "SPRING_CLOUD_VAULT_AUTHENTICATION=APPROLE"
      - "SPRING_CLOUD_VAULT_APP_ROLE_ROLE_ID_FILE=/vault-pki-certs/.approle/sentinel-gear.role_id"
      - "SPRING_CLOUD_VAULT_APP_ROLE_SECRET_ID_FILE=/vault-pki-certs/.approle/sentinel-gear.secret_id"
      - "SPRING_CLOUD_VAULT_APP_ROLE_APP_ROLE_PATH=approle"
      - "SPRING_CLOUD_VAULT_KV_BACKEND=${SPRING_CLOUD_VAULT_KV_BACKEND:-secret}"
      - "SPRING_CLOUD_VAULT_KV_CONTEXT=${SPRING_CLOUD_VAULT_KV_CONTEXT:-ironbucket/sentinel-gear}"
      - "SPRING_CLOUD_GATEWAY_HTTPCLIENT_PROTOCOL=HTTP11"
      - "SPRING_CLOUD_GATEWAY_HTTPCLIENT_POOL_TYPE=disabled"
      - "MANAGEMENT_HEALTH_VAULT_ENABLED=false"
      - "IRONBUCKET_SECURITY_VAULT_ENABLED=${IRONBUCKET_SECURITY_VAULT_ENABLED:-true}"
      - "IRONBUCKET_SECURITY_VAULT_URI=https://steel-hammer-vault:8200"
      - "IRONBUCKET_SECURITY_VAULT_TOKEN=${IRONBUCKET_SECURITY_VAULT_TOKEN:-dev-root-token}"
      - "IRONBUCKET_SECURITY_VAULT_KV_PATH=${IRONBUCKET_SECURITY_VAULT_KV_PATH:-secret/data/ironbucket/sentinel-gear}"
      - "IRONBUCKET_SECURITY_VAULT_SECRET_KEY=${IRONBUCKET_SECURITY_VAULT_SECRET_KEY:-presignedSecret}"
      - "IRONBUCKET_SECURITY_PRESIGNED_ENABLED=${IRONBUCKET_SECURITY_PRESIGNED_ENABLED:-true}"
      - "IRONBUCKET_SECURITY_PRESIGNED_SECRET=${IRONBUCKET_SECURITY_PRESIGNED_SECRET:-dev-presigned-secret-for-steel-hammer}"
      - "IRONBUCKET_SECURITY_PRESIGNED_NONCE_TTL=${IRONBUCKET_SECURITY_PRESIGNED_NONCE_TTL:-PT5M}"
      - "EUREKA_URI=https://buzzle-vane:8083/eureka"
      - "SERVER_SSL_ENABLED=true"
      - "SERVER_SSL_KEYSTORE=/vault-pki-certs/services/sentinel-gear/keystore.p12"
      - "SERVER_SSL_KEYSTORE_PASSWORD=changeit"
      - "SERVER_SSL_KEYSTORE_TYPE=PKCS12"
      - "SERVER_SSL_TRUSTSTORE=/vault-pki-certs/ca/ca-truststore.p12"
      - "SERVER_SSL_TRUSTSTORE_PASSWORD=changeit"
      - "SERVER_SSL_TRUSTSTORE_TYPE=PKCS12"
      - "MANAGEMENT_OTLP_TRACING_ENDPOINT=https://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_METRICS_TAGS_ENVIRONMENT=docker"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=https://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_SERVER_ADDRESS=0.0.0.0"
      - "MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always"
      - "HEALTH_CHECK_URL=https://steel-hammer-sentinel-gear:8081/actuator/health-check"

    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "curl -sf --cacert /vault-pki-certs/ca/ca.crt $${HEALTH_CHECK_URL}"]
      interval: 10s
      timeout: 5s
