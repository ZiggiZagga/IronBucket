      - "SPRING_CLOUD_VAULT_SSL_SKIP_VERIFY=false"
      - "SPRING_CLOUD_VAULT_SSL_VERIFY_HOSTNAME=true"
      - "SPRING_CLOUD_VAULT_SSL_TRUST_STORE=file:/vault-pki-certs/ca/ca-truststore.p12"
      - "SPRING_CLOUD_VAULT_SSL_TRUST_STORE_PASSWORD=changeit"
      - "SPRING_CLOUD_VAULT_SSL_TRUST_STORE_TYPE=PKCS12"
      - "SPRING_CLOUD_VAULT_AUTHENTICATION=APPROLE"
      - "SPRING_CLOUD_VAULT_APP_ROLE_ROLE_ID_FILE=/vault-pki-certs/.approle/graphite-forge.role_id"
      - "SPRING_CLOUD_VAULT_APP_ROLE_SECRET_ID_FILE=/vault-pki-certs/.approle/graphite-forge.secret_id"
      - "SPRING_CLOUD_VAULT_APP_ROLE_APP_ROLE_PATH=approle"
      - "SPRING_CLOUD_VAULT_KV_BACKEND=${SPRING_CLOUD_VAULT_KV_BACKEND:-secret}"
      - "SPRING_CLOUD_VAULT_KV_CONTEXT=${SPRING_CLOUD_VAULT_KV_CONTEXT:-ironbucket/graphite-forge}"
      - "LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY=DEBUG"
      - "EUREKA_URI=https://buzzle-vane:8083/eureka"
      - "SERVER_SSL_ENABLED=true"
      - "SERVER_SSL_CERTIFICATE=file:/vault-pki-certs/services/graphite-forge/fullchain.crt"
      - "SERVER_SSL_CERTIFICATE_PRIVATE_KEY=file:/vault-pki-certs/services/graphite-forge/tls.key"
      - "SERVER_SSL_KEYSTORE="
      - "SERVER_SSL_KEYSTORE_PASSWORD="
      - "SERVER_SSL_KEYSTORE_TYPE="
      - "MANAGEMENT_OTLP_TRACING_ENDPOINT=https://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_TRACING_SAMPLING_PROBABILITY=1.0"
      - "MANAGEMENT_METRICS_TAGS_ENVIRONMENT=docker"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=https://steel-hammer-otel-collector:4317"

    depends_on:
      steel-hammer-vault:
        condition: service_healthy
      steel-hammer-buzzle-vane:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "/bin/bash", "-lc", "exec 3<>/dev/tcp/localhost/8084"]
      interval: 10s
      timeout: 5s
      retries: 6

    restart: "always"

  steel-hammer-minio:
    networks:
      - steel-hammer-network

    hostname: steel-hammer-minio
    container_name: steel-hammer-minio

    restart: always

    build:
      context: ./minio
      dockerfile: DockerfileMinio

    command: /bin/sh -c "mkdir -p /opt/minio/.minio/certs && cp /vault-pki-certs/services/minio/tls.crt /opt/minio/.minio/certs/public.crt && cp /vault-pki-certs/services/minio/tls.key /opt/minio/.minio/certs/private.key && exec /opt/minio/minio server /opt/minio/data --console-address=':9001'"

    environment:
      - "MINIO_BROWSER=on"
      - "MINIO_ROOT_USER=${MINIO_ROOT_USER:-vault-managed-root-user}"
      - "MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-vault-managed-root-password}"
      - "MINIO_BROWSER_REDIRECT_URL=https://steel-hammer-minio:9001"
      - "MINIO_IDENTITY_OPENID_CONFIG_URL=https://steel-hammer-keycloak:7081/realms/dev/.well-known/openid-configuration"
      - "MINIO_IDENTITY_OPENID_CLIENT_ID=minio-console"
      - "MINIO_IDENTITY_OPENID_CLIENT_SECRET=minio-console-secret"
      - "MINIO_IDENTITY_OPENID_SCOPES=openid,profile,email"
      - "MINIO_IDENTITY_OPENID_CLAIM_NAME=policy"
      - "MINIO_IDENTITY_OPENID_REDIRECT_URI_DYNAMIC=on"
      - "SSL_CERT_FILE=/vault-pki-certs/ca/ca.crt"

    volumes:
      - vault-pki-certs:/vault-pki-certs:ro

    depends_on:
      steel-hammer-vault:
        condition: service_healthy
      steel-hammer-keycloak:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-sf", "--cacert", "/vault-pki-certs/ca/ca.crt", "https://steel-hammer-minio:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  steel-hammer-test:
    networks:
      - steel-hammer-network

    hostname: steel-hammer-test
    container_name: steel-hammer-test

    build:
      context: .
      dockerfile: ./DockerfileTestRunner

    volumes:
      - ./tests:/tests
      - /tmp/ironbucket-test:/tmp/ironbucket-test
      - /workspaces/IronBucket/test-results:/workspaces/IronBucket/test-results
      - ./test-scripts:/scripts:ro
      - ./keycloak/dev-realm.json:/workspaces/IronBucket/steel-hammer/keycloak/dev-realm.json:ro
      - ../scripts:/workspaces/IronBucket/scripts:ro
      - ../services:/workspaces/IronBucket/services:ro
      - ../tools:/workspaces/IronBucket/tools:ro
      - ../docs:/workspaces/IronBucket/docs:ro
      - ../README.md:/workspaces/IronBucket/README.md:ro
      - vault-pki-certs:/vault-pki-certs:ro
      - /workspaces/IronBucket/temp:/workspaces/IronBucket/temp
      - /workspaces/IronBucket/.git:/ironbucket/.git:ro

    depends_on:
      steel-hammer-keycloak:
        condition: service_healthy
      steel-hammer-postgres:
        condition: service_healthy
      steel-hammer-sentinel-gear:
        condition: service_healthy
      steel-hammer-claimspindel:
        condition: service_healthy
      steel-hammer-brazz-nossel:
        condition: service_healthy
      steel-hammer-buzzle-vane:
        condition: service_healthy

    environment:
      - "KEYCLOAK_URL=https://steel-hammer-keycloak:7081"
      - "MINIO_URL=https://steel-hammer-minio:9000"
      - "POSTGRES_HOST=steel-hammer-postgres"
      - "SENTINEL_GEAR_URL=https://steel-hammer-sentinel-gear:8080"
      - "CLAIMSPINDEL_URL=https://steel-hammer-claimspindel:8081"
      - "BRAZZ_NOSSEL_URL=https://steel-hammer-brazz-nossel:8082"
      - "BUZZLE_VANE_URL=https://buzzle-vane:8083"
      - "CURL_CA_BUNDLE=/vault-pki-certs/ca/ca.crt"
      - "NODE_EXTRA_CA_CERTS=/vault-pki-certs/ca/ca.crt"
      - "OTEL_SERVICE_NAME=steel-hammer-test"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=https://steel-hammer-otel-collector:4318"
      - "PLAYWRIGHT_REPORT_DIR=/workspaces/IronBucket/test-results"

    # Test will run automatically when container starts
    # Runs complete E2E verification: Maven tests + services + S3 + JWT
    entrypoint: ["/bin/sh", "-c", "/scripts/run-e2e-complete.sh"]

    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  steel-hammer-ui-e2e:
    networks:
      - steel-hammer-network

    build:
      context: .
      dockerfile: ./DockerfileUIE2E
    container_name: steel-hammer-ui-e2e
    working_dir: /workspace/ironbucket-app-nextjs

    volumes:
      - ../ironbucket-app-nextjs:/workspace/ironbucket-app-nextjs
      - vault-pki-certs:/vault-pki-certs:ro
      - /workspaces/IronBucket/test-results:/workspaces/IronBucket/test-results

    depends_on:
      steel-hammer-keycloak:
        condition: service_healthy
      steel-hammer-sentinel-gear:
        condition: service_healthy
      steel-hammer-graphite-forge:
        condition: service_healthy

    environment:
      - "CI=true"
      - "NEXT_PUBLIC_GRAPHQL_ENDPOINT=https://steel-hammer-sentinel-gear:8080/graphql"
      - "E2E_SENTINEL_URL=https://steel-hammer-sentinel-gear:8080"
      - "E2E_GATEWAY_GRAPHQL_URL=https://steel-hammer-sentinel-gear:8080/graphql"
      - "E2E_KEYCLOAK_TOKEN_URL=https://steel-hammer-keycloak:7081/realms/dev/protocol/openid-connect/token"
      - "NODE_EXTRA_CA_CERTS=/vault-pki-certs/ca/ca.crt"
      - "OTEL_SERVICE_NAME=ironbucket-ui-e2e"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=https://steel-hammer-otel-collector:4318"
      - "PLAYWRIGHT_REPORT_DIR=/workspaces/IronBucket/test-results"

    restart: "no"

networks:
  steel-hammer-network:
    driver: bridge

volumes:
  vault-storage:
  # Vault PKI-issued certs and AppRole credentials, written by Vault init;
  # read-only mounted by all application services.
  vault-pki-certs:
