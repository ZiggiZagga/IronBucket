services:

  steel-hammer-vault:
    networks:
      - steel-hammer-network

    build:
      context: .
      dockerfile: ./vault/DockerfileVault
    container_name: steel-hammer-vault
    hostname: steel-hammer-vault

    cap_add:
      - IPC_LOCK

    command: /bin/sh /vault/local/start-with-shared-ca.sh

    ports:
      - "8200:8200"

    volumes:
      - vault-storage:/vault/file
      # Bootstrap TLS cert for Vault itself (from certs/ until PKI self-issues)
      - ../certs:/certs:ro
      # PKI-issued certs written here by init-vault-pki.sh; mounted by all app services
      - vault-pki-certs:/vault/pki-certs
      - ./vault:/vault/local:ro

    environment:
      - "VAULT_ADDR=https://127.0.0.1:8200"
      - "VAULT_CACERT=/certs/ca/ca.crt"

    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-check-certificate -qO- https://127.0.0.1:8200/v1/sys/health?standbyok=true && test -f /vault/pki-certs/.ready"]
      interval: 10s
      timeout: 5s
      retries: 30

    restart: always

  steel-hammer-postgres:

    networks:
      - steel-hammer-network

    hostname: steel-hammer-postgres
    container_name: steel-hammer-postgres

    build:
      context: . 
      dockerfile: ./postgres/DockerfilePostgres
    
    environment:
      - "POSTGRES_PASSWORD=postgres_admin_pw"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    restart: always

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 12


  steel-hammer-keycloak:
    networks:
      - steel-hammer-network

    restart: always
    
    hostname: steel-hammer-keycloak
    container_name: steel-hammer-keycloak

    build:
      context: . 
      dockerfile: ./keycloak/DockerfileKeycloak
    
    entrypoint: [ "/opt/keycloak/keycloak/bin/kc.sh", "start", "--import-realm", "--http-enabled=false", "--https-port=7081", "--https-certificate-file=/certs/services/infrastructure/keycloak/tls.crt", "--https-certificate-key-file=/certs/services/infrastructure/keycloak/tls.key", "--https-client-auth=request", "--https-trust-store-file=/certs/ca/ca-truststore.p12", "--https-trust-store-password=changeit", "--https-trust-store-type=PKCS12", "--hostname=https://steel-hammer-keycloak:7081", "--hostname-strict=false" ]
    
    volumes:      
       - ./keycloak/dev-realm.json:/opt/keycloak/keycloak/data/import/dev-realm.json
       - ../certs:/certs:ro
      
    environment:
      #- "KC_HTTPS_KEY_STORE_FILE=/opt/keycloak/certs/keycloak.jks"
      #- "KC_HTTPS_KEY_STORE_PASSWORD=KC_HTTPS_KEY_STORE_PASSWORD"
      - "KC_BOOTSTRAP_ADMIN_USERNAME=admin"
      - "KC_BOOTSTRAP_ADMIN_PASSWORD=admin"
      - "KC_DB=postgres"
      - "KC_DB_USERNAME=keycloak_db_user"
      - "KC_DB_PASSWORD=keycloak_db_pass"
      - "KC_DB_URL=jdbc:postgresql://steel-hammer-postgres:5432/keycloak"

    depends_on:
      - steel-hammer-postgres

    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:7081/realms/dev/.well-known/openid-configuration"]
      interval: 10s
      timeout: 5s
      retries: 12

  steel-hammer-buzzle-vane:
    networks:
      steel-hammer-network:
        aliases:
          - buzzle-vane
          - buzzle-vane.ironbucket.local

    hostname: steel-hammer-buzzle-vane
    container_name: steel-hammer-buzzle-vane

    build:
      context: ../services/Buzzle-Vane
      dockerfile: Dockerfile

    depends_on:
      steel-hammer-keycloak:
        condition: service_healthy
      steel-hammer-postgres:
        condition: service_healthy
      steel-hammer-vault:
        condition: service_healthy

    user: "0:0"

    entrypoint: ["/bin/sh", "-c"]
    command: ["export SPRING_CLOUD_VAULT_APP_ROLE_ROLE_ID=$$(cat /vault-pki-certs/.approle/buzzle-vane.role_id) && export SPRING_CLOUD_VAULT_APP_ROLE_SECRET_ID=$$(cat /vault-pki-certs/.approle/buzzle-vane.secret_id) && if [ \"$${BUZZLE_VANE_TLS_MODE:-pem}\" = \"vault-pkcs12\" ]; then unset SERVER_SSL_CERTIFICATE SERVER_SSL_CERTIFICATE_PRIVATE_KEY && export SERVER_SSL_KEYSTORE=\"$${SERVER_SSL_KEYSTORE:-/vault-pki-certs/services/buzzle-vane/keystore.p12}\" SERVER_SSL_KEYSTORE_PASSWORD=\"$${SERVER_SSL_KEYSTORE_PASSWORD:-changeit}\" SERVER_SSL_KEY_PASSWORD=\"$${SERVER_SSL_KEY_PASSWORD:-changeit}\" SERVER_SSL_KEYSTORE_TYPE=\"$${SERVER_SSL_KEYSTORE_TYPE:-PKCS12}\"; else export SERVER_SSL_KEYSTORE=\"\" SERVER_SSL_KEYSTORE_PASSWORD=\"\" SERVER_SSL_KEY_PASSWORD=\"\" SERVER_SSL_KEYSTORE_TYPE=\"\" SERVER_SSL_CERTIFICATE=\"$${BUZZLE_VANE_PEM_CERT}\" SERVER_SSL_CERTIFICATE_PRIVATE_KEY=\"$${BUZZLE_VANE_PEM_KEY}\"; fi && cp /vault-pki-certs/ca/ca.crt /usr/local/share/ca-certificates/ironbucket-ca.crt && update-ca-certificates && exec java -jar app.jar --spring.profiles.active=docker${MTLS_PROFILE:-}"]

    volumes:
      - ../certs:/certs:ro
      - vault-pki-certs:/vault-pki-certs:ro

    environment:
      - "SPRING_PROFILES_ACTIVE=docker${MTLS_PROFILE:-}"
      - "CERT_BASE_PATH=file:/vault-pki-certs"
      - "JAVA_TOOL_OPTIONS=-Djavax.net.ssl.trustStore=/vault-pki-certs/ca/ca-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
      - "SPRING_APPLICATION_NAME=buzzle-vane"
      - "SPRING_CLOUD_VAULT_ENABLED=${SPRING_CLOUD_VAULT_ENABLED:-true}"
      - "SPRING_CLOUD_VAULT_URI=https://steel-hammer-vault:8200"
      - "SPRING_CLOUD_VAULT_SSL_SKIP_VERIFY=false"
      - "SPRING_CLOUD_VAULT_AUTHENTICATION=APPROLE"
      - "SPRING_CLOUD_VAULT_APP_ROLE_ROLE_ID_FILE=/vault-pki-certs/.approle/buzzle-vane.role_id"
      - "SPRING_CLOUD_VAULT_APP_ROLE_SECRET_ID_FILE=/vault-pki-certs/.approle/buzzle-vane.secret_id"
      - "SPRING_CLOUD_VAULT_APP_ROLE_APP_ROLE_PATH=approle"
      - "SPRING_CLOUD_VAULT_KV_BACKEND=${SPRING_CLOUD_VAULT_KV_BACKEND:-secret}"
      - "SPRING_CLOUD_VAULT_KV_CONTEXT=${SPRING_CLOUD_VAULT_KV_CONTEXT:-ironbucket/buzzle-vane}"
      - "MANAGEMENT_HEALTH_VAULT_ENABLED=false"
      - "EUREKA_SERVER_ENABLE_SELF_PRESERVATION=false"
      - "SERVER_SSL_ENABLED=true"
      - "BUZZLE_VANE_TLS_MODE=${BUZZLE_VANE_TLS_MODE:-pem}"
      - "BUZZLE_VANE_PEM_CERT=${BUZZLE_VANE_PEM_CERT:-file:/certs/services/buzzle-vane/fullchain.crt}"
      - "BUZZLE_VANE_PEM_KEY=${BUZZLE_VANE_PEM_KEY:-file:/certs/services/buzzle-vane/tls.key}"
      - "SERVER_SSL_KEYSTORE=${SERVER_SSL_KEYSTORE:-/vault-pki-certs/services/buzzle-vane/keystore.p12}"
      - "SERVER_SSL_KEYSTORE_PASSWORD=${SERVER_SSL_KEYSTORE_PASSWORD:-changeit}"
      - "SERVER_SSL_KEY_PASSWORD=${SERVER_SSL_KEY_PASSWORD:-changeit}"
      - "SERVER_SSL_KEY_ALIAS=${SERVER_SSL_KEY_ALIAS:-}"
      - "SERVER_SSL_KEYSTORE_TYPE=${SERVER_SSL_KEYSTORE_TYPE:-PKCS12}"
      - "MANAGEMENT_OTLP_TRACING_ENDPOINT=https://steel-hammer-otel-collector:4317"
      - "MANAGEMENT_METRICS_TAGS_ENVIRONMENT=docker"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=https://steel-hammer-otel-collector:4317"
      - "HEALTH_CHECK_URL=https://localhost:8083/actuator/health"

    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "curl -sf --cacert /vault-pki-certs/ca/ca.crt $${HEALTH_CHECK_URL}"]
      interval: 10s
      timeout: 5s
      retries: 3

    restart: "always"

  steel-hammer-sentinel-gear:
