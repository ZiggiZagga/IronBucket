server:
  port: 8081
  error:
    include-message: always
  ssl:
    enabled: ${SERVER_SSL_ENABLED:true}
    key-store: ${SERVER_SSL_KEYSTORE:/vault-pki-certs/services/claimspindel/keystore.p12}
    key-store-password: ${SERVER_SSL_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${SERVER_SSL_KEYSTORE_TYPE:PKCS12}
    trust-store: ${SERVER_SSL_TRUSTSTORE:/vault-pki-certs/ca/ca-truststore.p12}
    trust-store-password: ${SERVER_SSL_TRUSTSTORE_PASSWORD:changeit}
    trust-store-type: ${SERVER_SSL_TRUSTSTORE_TYPE:PKCS12}

spring:
  application:
    name: claimspindel
  datasource:
    url: jdbc:postgresql://steel-hammer-postgres:5432/ironbucket
    username: postgres
    password: ${POSTGRES_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://steel-hammer-keycloak:7081/realms/dev
          jwk-set-uri: https://steel-hammer-keycloak:7081/realms/dev/protocol/openid-connect/certs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:https://steel-hammer-otel-collector:4317}
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: docker

logging:
  level:
    root: INFO
    com.ironbucket: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId:-},%X{spanId:-}] [%X{requestId:-}] %-5level %logger{36} - %msg%n"

# Service configuration
app:
  routing:
    timeout-ms: 10000
  policy:
    engine-url: https://sentinel-gear:8080/policy/evaluate
    cache-ttl-minutes: 5
    retries: 3
  sentinel-gear:
    url: https://sentinel-gear:8080
    timeout-ms: 5000
