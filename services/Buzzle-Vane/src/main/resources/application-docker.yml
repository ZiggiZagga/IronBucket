server:
  port: 8083
  error:
    include-message: always
  ssl:
    enabled: ${SERVER_SSL_ENABLED:true}
    key-store: ${SERVER_SSL_KEYSTORE:/vault-pki-certs/services/buzzle-vane/keystore.p12}
    key-store-password: ${SERVER_SSL_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${SERVER_SSL_KEYSTORE_TYPE:PKCS12}
    trust-store: ${SERVER_SSL_TRUSTSTORE:/vault-pki-certs/ca/ca-truststore.p12}
    trust-store-password: ${SERVER_SSL_TRUSTSTORE_PASSWORD:changeit}
    trust-store-type: ${SERVER_SSL_TRUSTSTORE_TYPE:PKCS12}

spring:
  application:
    name: buzzle-vane
  main:
    web-application-type: servlet
  cloud:
    client:
      registration:
        enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,discovery
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:https://steel-hammer-otel-collector:4317}
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: docker

logging:
  level:
    root: INFO
    com.ironbucket: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{traceId:-},%X{spanId:-}] [%X{requestId:-}] %-5level %logger{36} - %msg%n"

# Service discovery configuration
app:
  discovery:
    enabled: true
    services:
      - name: sentinel-gear
        url: https://sentinel-gear:8080
        healthcheck: /actuator/health
      - name: claimspindel
        url: https://claimspindel:8081
        healthcheck: /actuator/health
      - name: brazz-nossel
        url: https://brazz-nossel:8082
        healthcheck: /actuator/health
  registry:
    location: /app/registry
