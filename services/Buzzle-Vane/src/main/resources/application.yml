server:
  port: 8761
  
spring:
  config:
    import: optional:vault://
  application:
    name: buzzle-vane
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:https://steel-hammer-keycloak:7081}/realms/dev
  main:
    web-application-type: servlet
  threads:
    virtual:
      enabled: true
  cloud:
    vault:
      enabled: ${SPRING_CLOUD_VAULT_ENABLED:false}
      uri: ${SPRING_CLOUD_VAULT_URI:https://127.0.0.1:8200}
      token: ${SPRING_CLOUD_VAULT_TOKEN:}
      kv:
        enabled: true
        backend: ${SPRING_CLOUD_VAULT_KV_BACKEND:secret}
        default-context: ${SPRING_CLOUD_VAULT_KV_CONTEXT:ironbucket/buzzle-vane}
    
eureka:
  instance:
    hostname: ${EUREKA_HOST:localhost}
    prefer-ip-address: true
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    region: ${EUREKA_REGION:dev-region-1}
