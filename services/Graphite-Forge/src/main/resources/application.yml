server:
  port: 8084
  error:
    include-message: always
    include-binding-errors: always
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    certificate: ${SERVER_SSL_CERTIFICATE:}
    certificate-private-key: ${SERVER_SSL_CERTIFICATE_PRIVATE_KEY:}
    key-store: ${SERVER_SSL_KEYSTORE:}
    key-store-password: ${SERVER_SSL_KEYSTORE_PASSWORD:}
    key-password: ${SERVER_SSL_KEY_PASSWORD:${SERVER_SSL_KEYSTORE_PASSWORD:}}
    key-store-type: ${SERVER_SSL_KEYSTORE_TYPE:}
    trust-store: ${SERVER_SSL_TRUSTSTORE:}
    trust-store-password: ${SERVER_SSL_TRUSTSTORE_PASSWORD:}
    trust-store-type: ${SERVER_SSL_TRUSTSTORE_TYPE:}

spring:
  config:
    import: optional:vault://
  application:
    name: graphite-forge
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:https://steel-hammer-keycloak:7081}/realms/dev
  threads:
    virtual:
      enabled: true
  main:
    web-application-type: reactive
  cloud:
    vault:
      enabled: ${SPRING_CLOUD_VAULT_ENABLED:false}
      uri: ${SPRING_CLOUD_VAULT_URI:https://127.0.0.1:8200}
      authentication: ${SPRING_CLOUD_VAULT_AUTHENTICATION:TOKEN}
      token: ${SPRING_CLOUD_VAULT_TOKEN:}
      app-role:
        role-id-file: ${SPRING_CLOUD_VAULT_APP_ROLE_ROLE_ID_FILE:}
        secret-id-file: ${SPRING_CLOUD_VAULT_APP_ROLE_SECRET_ID_FILE:}
        app-role-path: ${SPRING_CLOUD_VAULT_APP_ROLE_APP_ROLE_PATH:approle}
      ssl:
        verify-hostname: ${SPRING_CLOUD_VAULT_SSL_VERIFY_HOSTNAME:true}
        trust-store: ${SPRING_CLOUD_VAULT_SSL_TRUST_STORE:}
        trust-store-password: ${SPRING_CLOUD_VAULT_SSL_TRUST_STORE_PASSWORD:}
        trust-store-type: ${SPRING_CLOUD_VAULT_SSL_TRUST_STORE_TYPE:PKCS12}
      kv:
        enabled: true
        backend: ${SPRING_CLOUD_VAULT_KV_BACKEND:secret}
        default-context: ${SPRING_CLOUD_VAULT_KV_CONTEXT:ironbucket/graphite-forge}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:https://steel-hammer-buzzle-vane:8083/eureka}
    region: ${EUREKA_REGION:dev-region-1}
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
    status-page-url-path: /actuator/info
    health-check-url-path: /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:default}
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:https://steel-hammer-otel-collector:4317}

logging:
  level:
    root: INFO
    com.ironbucket: DEBUG
    org.springframework.graphql: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-},%X{spanId:-}] %-5level %logger{36} - %msg%n"