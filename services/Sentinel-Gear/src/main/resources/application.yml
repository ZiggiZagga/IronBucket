logging:
  level:
    root: INFO
    com:
      ironbucket: DEBUG
    org:
      springframework:
        security: INFO
        cloud: INFO
  config: classpath:logback-spring.xml

server:
  port: 8080
  shutdown: graceful
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEYSTORE:}
    key-store-password: ${SERVER_SSL_KEYSTORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEYSTORE_TYPE:PKCS12}
    trust-store: ${SERVER_SSL_TRUSTSTORE:}
    trust-store-password: ${SERVER_SSL_TRUSTSTORE_PASSWORD:}
    trust-store-type: ${SERVER_SSL_TRUSTSTORE_TYPE:PKCS12}
  servlet:
    context-path: /

management:
  server:
    port: 8081
    address: localhost
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,metrics,prometheus,tracing,loggers
      path-mapping:
        health: health-check
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:default}
      region: ${EUREKA_REGION:dev-region-1}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      headers:
        Authorization: ${OTEL_EXPORTER_OTLP_HEADERS:}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    region: ${EUREKA_REGION:dev-region-1}
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
    status-page-url-path: ${management.endpoints.web.base-path}/health
    health-check-url-path: ${management.endpoints.web.base-path}/health

spring:
  config:
    import: optional:vault://
  application:
    name: sentinel-gear
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s

  cloud:
    vault:
      enabled: ${SPRING_CLOUD_VAULT_ENABLED:false}
      uri: ${SPRING_CLOUD_VAULT_URI:https://127.0.0.1:8200}
      token: ${SPRING_CLOUD_VAULT_TOKEN:}
      kv:
        enabled: true
        backend: ${SPRING_CLOUD_VAULT_KV_BACKEND:secret}
        default-context: ${SPRING_CLOUD_VAULT_KV_CONTEXT:ironbucket/sentinel-gear}
    gateway:
      server:
        webflux:
          default-filters:
            - TokenRelay
          routes: 
            - id: route-graphite-forge-graphql
              order: -100
              uri: ${GRAPHITE_FORGE_URI:http://steel-hammer-graphite-forge:8084}
              predicates:
                - Path=/graphql,/graphql/**
            - id: route-hub
              order: 100
              uri: lb://CLAIMSPINDEL
              predicates:
                - Path=/**
          globalcors:
            add-to-simple-url-handler-mapping: true
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:https://steel-hammer-keycloak:7081/realms/dev}
  docker:
    compose:
      enabled: false

ironbucket:
  security:
    presigned:
      enabled: ${IRONBUCKET_SECURITY_PRESIGNED_ENABLED:true}
      secret: ${IRONBUCKET_SECURITY_PRESIGNED_SECRET:}
      nonce-ttl: ${IRONBUCKET_SECURITY_PRESIGNED_NONCE_TTL:PT5M}
    vault:
      enabled: ${IRONBUCKET_SECURITY_VAULT_ENABLED:false}
      uri: ${IRONBUCKET_SECURITY_VAULT_URI:${SPRING_CLOUD_VAULT_URI:https://127.0.0.1:8200}}
      token: ${IRONBUCKET_SECURITY_VAULT_TOKEN:${SPRING_CLOUD_VAULT_TOKEN:}}
      kv-path: ${IRONBUCKET_SECURITY_VAULT_KV_PATH:secret/data/ironbucket/sentinel-gear}
      secret-key: ${IRONBUCKET_SECURITY_VAULT_SECRET_KEY:presignedSecret}
      timeout: ${IRONBUCKET_SECURITY_VAULT_TIMEOUT:PT2S}
