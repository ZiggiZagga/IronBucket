server:
  port: 0
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEYSTORE:}
    key-store-password: ${SERVER_SSL_KEYSTORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEYSTORE_TYPE:PKCS12}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    region: ${EUREKA_REGION:dev-region-1}

spring:
  config:
    import: optional:vault://
  application:
    name: brazz-nossel
  threads:
    virtual:
      enabled: true

  cloud:
    vault:
      enabled: ${SPRING_CLOUD_VAULT_ENABLED:false}
      uri: ${SPRING_CLOUD_VAULT_URI:https://127.0.0.1:8200}
      authentication: ${SPRING_CLOUD_VAULT_AUTHENTICATION:TOKEN}
      token: ${SPRING_CLOUD_VAULT_TOKEN:}
      app-role:
        role-id-file: ${SPRING_CLOUD_VAULT_APP_ROLE_ROLE_ID_FILE:}
        secret-id-file: ${SPRING_CLOUD_VAULT_APP_ROLE_SECRET_ID_FILE:}
        app-role-path: ${SPRING_CLOUD_VAULT_APP_ROLE_APP_ROLE_PATH:approle}
      ssl:
        verify-hostname: ${SPRING_CLOUD_VAULT_SSL_VERIFY_HOSTNAME:true}
      kv:
        enabled: true
        backend: ${SPRING_CLOUD_VAULT_KV_BACKEND:secret}
        default-context: ${SPRING_CLOUD_VAULT_KV_CONTEXT:ironbucket/brazz-nossel}
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
          discovery:
            locator:
              lower-case-service-id: true
              enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:https://steel-hammer-keycloak:7081/realms/dev}
          jwk-set-uri: ${OAUTH2_ISSUER_URI:https://steel-hammer-keycloak:7081/realms/dev}/protocol/openid-connect/certs
