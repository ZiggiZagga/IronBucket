name: e2e-complete-suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: e2e-complete-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-complete-suite:
    name: e2e-complete-suite
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        run: bash scripts/ci/setup-java-25.sh 25

      - name: Verify Docker availability
        run: |
          docker --version
          if command -v docker-compose >/dev/null 2>&1; then
            docker-compose --version
          else
            docker compose version
          fi

      - name: Validate shell scripts
        run: bash scripts/ci/validate-shell-scripts.sh

      - name: Run Phase 1-4 E2E proof gate
        env:
          KEEP_STACK: "false"
        run: |
          chmod +x scripts/e2e/prove-phase1-4-complete.sh
          bash scripts/e2e/prove-phase1-4-complete.sh

      - name: Upload E2E proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-complete-suite-artifacts
          path: |
            test-results/phase1-3-proof/
            test-results/phase1-4-proof/
          retention-days: 30
