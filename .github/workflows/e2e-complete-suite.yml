name: e2e-complete-suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: e2e-complete-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-complete-suite:
    name: e2e-complete-suite
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        run: bash scripts/ci/setup-java-25.sh 25

      - name: Verify Docker availability
        run: |
          docker --version
          if command -v docker-compose >/dev/null 2>&1; then
            docker-compose --version
          else
            docker compose version
          fi

      - name: Validate shell scripts
        run: bash scripts/ci/validate-shell-scripts.sh

      - name: Verify roadmap E2E docs/workflow sync
        run: bash scripts/ci/verify-e2e-doc-sync.sh

      - name: Enforce containerized test policy
        run: bash scripts/ci/verify-containerized-tests-only.sh

      - name: Run first-user-experience gate
        env:
          KEEP_STACK: "false"
        run: |
          chmod +x scripts/ci/run-first-user-experience-gate.sh
          bash scripts/ci/run-first-user-experience-gate.sh

      - name: Run Phase 2 observability infra gate
        env:
          KEEP_STACK: "false"
          INFRA_KEYCLOAK_UP_SUM_THRESHOLD: "0.0"
          INFRA_MINIO_UP_SUM_THRESHOLD: "1.0"
          INFRA_POSTGRES_EXPORTER_UP_SUM_THRESHOLD: "1.0"
          PERF_P95_MS_THRESHOLD: "350"
          PERF_P99_MS_THRESHOLD: "650"
          PERF_RPS_THRESHOLD: "20"
          PERF_ERROR_RATE_THRESHOLD: "1.0"
        run: |
          chmod +x scripts/ci/run-observability-infra-gate.sh
          bash scripts/ci/run-observability-infra-gate.sh

      - name: Validate observability dashboards and alerts
        run: |
          chmod +x scripts/ci/validate-observability-assets.sh
          bash scripts/ci/validate-observability-assets.sh

      - name: Upload E2E proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-complete-suite-artifacts
          path: |
            test-results/phase1-3-proof/
            test-results/phase1-4-proof/
            test-results/phase2-observability/
            test-results/phase2-performance/
          retention-days: 30
