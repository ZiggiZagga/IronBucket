spring:
  application:
    name: graphite-admin-shell
  main:
    banner-mode: "off"
  shell:
    history:
      name: admin-shell-history
    interactive:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:https://keycloak.internal:7081}/realms/graphite

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}
    metrics:
      export:
        enabled: true
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://otel-collector:4318/v1/metrics}
  observations:
    key-values:
      service.name: graphite-admin-shell

logging:
  level:
    root: INFO
    com.ironbucket.adminshell: DEBUG
