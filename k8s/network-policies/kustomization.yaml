apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: network-policies
  namespace: default

resources:
  # Base policies (deny-all default)
  - base/deny-all-default.yaml
  
  # Service-tier policies
  - service-tier/sentinel-gear-policies.yaml
  - service-tier/claimspindel-policies.yaml
  - service-tier/brazz-nossel-policies.yaml
  - service-tier/buzzle-vane-policies.yaml
  
  # Infrastructure-tier policies
  - infrastructure-tier/postgres-policies.yaml
  - infrastructure-tier/minio-policies.yaml
  - infrastructure-tier/keycloak-policies.yaml

commonLabels:
  managed-by: kustomize
  category: network-isolation
  component: ironbucket-core

commonAnnotations:
  description: "Zero-Trust Network Policies for IronBucket Services"
  documentation: "k8s/network-policies/README.md"
